<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Farmacias Emerita | Contacto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body class="inner">

<nav id="navbar" class="navbar navbar-expand-lg navbar-dark fixed-top transition-navbar">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <img src="img/logo.png" alt="Farmacias Emerita" height="50">
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="nosotros.html">Nosotros</a></li>
        <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
        <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
        <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="py-5">
  <div class="container">
    <h2 class="text-center mb-4">Contáctanos</h2>

    <form id="contactForm" class="mx-auto" style="max-width: 720px;">
      <div class="row">
        <div class="col-md-6 mb-3">
          <input id="nombre" type="text" class="form-control" placeholder="Nombre" required>
        </div>
        <div class="col-md-6 mb-3">
          <input id="correo" type="email" class="form-control" placeholder="Correo Electrónico" required>
        </div>
      </div>

      <div class="mb-3">
        <input id="telefono" type="tel" class="form-control" placeholder="Teléfono (opcional)">
      </div>

      <textarea id="mensaje" class="form-control mb-3" rows="4" placeholder="Mensaje" required></textarea>

      <div class="text-center">
        <button type="submit" class="btn btn-teal">Enviar</button>
      </div>

      <p id="respuestaFormulario" class="text-center mt-3 small"></p>
    </form>
  </div>
</main>

<footer class="custom-navbar text-white text-center py-3">
  <p>© 2026 Farmacias Emerita - Todos los derechos reservados</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  function updateNavbar() {
    const navbar = document.getElementById("navbar");
    if (!navbar) return;

    const path = window.location.pathname.toLowerCase();
    const isHome =
      path.endsWith("/index.html") ||
      path === "/" ||
      path.endsWith("/");

    if (!isHome) {
      navbar.classList.add("navbar-scrolled");
      return;
    }

    if (window.scrollY > 50) navbar.classList.add("navbar-scrolled");
    else navbar.classList.remove("navbar-scrolled");
  }

  window.addEventListener("load", updateNavbar);
  window.addEventListener("scroll", updateNavbar);
</script>

<script>
  const form = document.getElementById("contactForm");
  const respuestaFormulario = document.getElementById("respuestaFormulario");

  form.addEventListener("submit", async function (event) {
    event.preventDefault();

    const datos = {
      nombre: document.getElementById("nombre").value,
      correo: document.getElementById("correo").value,
      telefono: document.getElementById("telefono").value,
      mensaje: document.getElementById("mensaje").value
    };

    try {
      const respuesta = await fetch("https://backend-farmacias-emerita.onrender.com/api/contactos", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(datos)
      });

      if (respuesta.ok) {
        respuestaFormulario.textContent = "Mensaje enviado correctamente.";
        respuestaFormulario.className = "text-center mt-3 small text-success";
        form.reset();
      } else {
        respuestaFormulario.textContent = "Error al enviar el mensaje.";
        respuestaFormulario.className = "text-center mt-3 small text-danger";
      }
    } catch (error) {
      respuestaFormulario.textContent = "No se pudo conectar con el servidor.";
      respuestaFormulario.className = "text-center mt-3 small text-danger";
      console.error(error);
    }
  });
</script>

</body>
</html>
